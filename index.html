<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة مهند</title>
    <style>
        /* تنسيق كامل الصفحة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* توسط النص أفقياً (من اليمين لليسار) */
            align-items: center;    /* توسط النص عمودياً (من الأعلى للأسفل) */
            height: 100vh;           /* جعل الصفحة تأخذ طول شاشة الجهاز بالكامل */
            background-color: #f4f7f6; /* لون خلفية هادئ ومريح */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* نوع الخط */
        }

        /* تنسيق اسم مهند */
        h1 {
            font-size: 3.5rem;       /* تكبير حجم الخط ليصبح واضحاً */
            color: #2c3e50;          /* اختيار لون كحلي غامق أنيق للنص */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* ظل خفيف خلف الاسم لإعطائه جمالية */
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- العنصر المراد وضعه في المنتصف -->
    <h1>مهند</h1>

</body>
</html>
